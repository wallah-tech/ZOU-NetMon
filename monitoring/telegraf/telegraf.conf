[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"
  hostname = "ict-monitoring-server"
  omit_hostname = false

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "ict-super-secret-influx-token"
  organization = "ict-netmon"
  bucket = "network-metrics"

[[inputs.snmp]]
  agents = ["udp://10.10.0.1:161"]
  version = 2
  community = "public"

  # System Info
  [[inputs.snmp.field]]
    name = "hostname"
    oid = ".1.3.6.1.2.1.1.5.0"
    is_tag = true
  
  [[inputs.snmp.field]]
    name = "uptime"
    oid = ".1.3.6.1.2.1.1.3.0"

  # Interface 1 (Gi0/1 or similar)
  [[inputs.snmp.field]]
    name = "if1_in"
    oid = ".1.3.6.1.2.1.2.2.1.10.1"

  [[inputs.snmp.field]]
    name = "if1_out"
    oid = ".1.3.6.1.2.1.2.2.1.16.1"

  # Interface 2 
  [[inputs.snmp.field]]
    name = "if2_in"
    oid = ".1.3.6.1.2.1.2.2.1.10.2"

  [[inputs.snmp.field]]
    name = "if2_out"
    oid = ".1.3.6.1.2.1.2.2.1.16.2"

  # Interface 3
  [[inputs.snmp.field]]
    name = "if3_in"
    oid = ".1.3.6.1.2.1.2.2.1.10.3"

  [[inputs.snmp.field]]
    name = "if3_out"
    oid = ".1.3.6.1.2.1.2.2.1.16.3"
